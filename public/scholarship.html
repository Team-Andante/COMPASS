<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 장학금/정책 추천 시스템</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 40px 20px; }
        .container { max-width: 700px; width: 100%; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { color: #1a73e8; font-size: 24px; margin-bottom: 10px; }
        p.desc { color: #5f6368; margin-bottom: 25px; line-height: 1.5; }
        
        .input-group { margin-bottom: 20px; }
        textarea { 
            width: 100%; height: 120px; padding: 15px; border: 1px solid #dadce0; border-radius: 8px; 
            resize: none; font-size: 16px; box-sizing: border-box; transition: border 0.3s;
        }
        textarea:focus { outline: none; border-color: #1a73e8; }
        
        button { 
            width: 100%; padding: 15px; background-color: #1a73e8; color: white; border: none; 
            border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.3s;
        }
        button:hover { background-color: #1557b0; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }

        #result-area { 
            margin-top: 30px; padding: 20px; border-top: 2px solid #f0f2f5; display: none; 
        }
        .loading-spinner { display: none; text-align: center; margin: 20px 0; color: #1a73e8; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎓 AI 맞춤 장학금 추천</h1>
    <p class="desc">자신의 상황(지역, 학년, 학과, 소득분위 등)을 상세히 입력하시면 AI가 가장 적합한 3,000여 개의 장학금 데이터를 분석하여 추천해 드립니다.</p>

    <div class="input-group">
        <textarea id="userInput" placeholder="예: 전주에 거주하는 공대 대학생 3학년입니다. 성적은 3.5점이고 생활비 지원을 받을 수 있는 장학금이 있을까요?"></textarea>
    </div>

    <button id="sendBtn" onclick="askAI()">추천 결과 확인하기</button>

    <div id="loader" class="loading-spinner">
        <strong>AI가 데이터를 분석하고 있습니다...</strong>
    </div>

    <div id="result-area" class="markdown-body">
        </div>
</div>

<script src="./scripts/scholarship.js"></script>
</body>
</html>
