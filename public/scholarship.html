<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Andante | Gemini 3.5 장학금 가이드</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/base/theme.css">
    <link rel="stylesheet" href="./css/components/navbar.css">
    <link rel="stylesheet" href="./css/components/buttons.css">
    <link rel="stylesheet" href="./css/pages/scholarship.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

</head>
<body>
    <div class="container">
        <div class="header">
            <h2>🎓 장학금 AI 가이드 (Gemini 3.5 Flash)</h2>
            <div class="update-tag">⚡ 최신 모델 기반 실시간 분석 중</div>
        </div>

        <div class="ai-chat-card">
            <span class="filter-label">🤖 Gemini 3.5에게 물어보기</span>
            <div class="ai-group">
                <input type="text" id="aiInput" placeholder="예: 양천구 거주 고등학생 장학금 조건 요약해줘">
                <button class="ai-btn" onclick="askAI()">질문하기</button>
            </div>
            <div id="aiResponse"></div>
        </div>
    </div>

    <script>
        async function askAI() {
            const input = document.getElementById('aiInput');
            const resDiv = document.getElementById('aiResponse');
            if(!input.value.trim()) return;

            resDiv.style.display = 'block';
            resDiv.innerHTML = '⚡ <b>Gemini 3.5 Flash</b>가 데이터를 분석하고 있습니다...';

            try {
                const response = await fetch('http://localhost:3000/ask-ai', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ message: input.value })
                });
                const data = await response.json();
                // 마크다운 변환 및 출력
                resDiv.innerHTML = `<div style="color:#64748b; font-size:12px; margin-bottom:10px;">🤖 AI 상담 결과:</div>` + marked.parse(data.reply);
            } catch (e) {
                resDiv.innerHTML = '<span style="color:red;">❌ 서버 연결에 실패했습니다.</span>';
            }
        }

        <iframe src="https://notebooklm.google.com/notebook/2ec911a4-25bb-44fa-9ae7-73dcfee81bb5" width="100%" height="600px"></iframe>
    </script>
</body>
</html>
