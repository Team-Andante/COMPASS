<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>EBSi 강좌 추천 - COMPASS</title>
        <link rel="stylesheet" href="./css/base/theme.css">
        <link rel="stylesheet" href="./css/components/navbar.css">
        <link rel="stylesheet" href="./css/components/buttons.css">
        <link rel="stylesheet" href="./css/components/cards.css">
        <link rel="stylesheet" href="./css/components/toasts.css">
        <link rel="stylesheet" href="./css/pages/class_rec.css">
        <script type="module" src="./scripts/class_rec.js" defer></script>
    <script type="module" src="./scripts/logout.js" defer></script>
    </head>
<body>
    <nav class="navbar">
        <div class="logo" onclick="location.href='/index_reged.html'" style="cursor:pointer">
            <img src="./images/logo.png" alt="COMPASS 로고" class="logoimg">
            COM<span>PASS</span>
        </div>
        <div class="nav-links">
            <a href="./login.html">서비스 소개</a>
            <a href="./mypage.html">마이페이지</a>
            <button class="logout-btn">로그아웃</button>
        </div>
    </nav>

    <button type="button" class="back-btn" onclick="history.back();" aria-label="뒤로가기">←</button>

    <div class="container">
        <h1>🎓 EBSi 맞춤 강좌 큐레이션</h1>
        <p class="subtitle">나의 학년과 목표에 딱 맞는 강의를 추천해 드려요.</p>

        <div class="filter-card">
            <div class="filter-group">
                <label>내 학년</label>
                <select id="grade">
                    <option value="high_1.csv">고등학교 1학년</option>
                    <option value="high_2.csv">고등학교 2학년</option>
                    <option value="high_3.csv">고등학교 3학년</option>
                </select>
            </div>

            <div class="filter-group">
                <label>학습 과목</label>
                <select id="subject">
                    <option value="국어">국어</option>
                    <option value="수학">수학</option>
                    <option value="영어">영어</option>
                    <option value="한국사">한국사</option>
                    <option value="사회">사회</option>
                    <option value="과학">과학</option>
                </select>
            </div>

            <div class="filter-group">
                <label>학습 목적</label>
                <select id="category">
                    <option value="개념완성">기본 개념 완성</option>
                    <option value="입문">기초 입문</option>
                    <option value="문제풀이">실전 문제 풀이</option>
                    <option value="학교시험대비">내신/시험 대비</option>
                </select>
            </div>

            <div class="filter-group">
                <label>난이도</label>
                <select id="level">
                    <option value="기초">기초 (쉽게 설명)</option>
                    <option value="기본">기본 (표준 난이도)</option>
                    <option value="발전">발전 (심화 학습)</option>
                </select>
            </div>

            <button id="recommendBtn">강좌 추천받기</button>
        </div>

        <div id="results" class="results-grid">
            </div>
    </div>

    <div id="logout-modal" class="logout-modal">
        <div class="logout-content">
            <p>로그아웃 하시겠습니까?</p>
            <div class="logout-buttons">
                <button id="logout-btn-yes" class="logout-btn yes">확인</button>
                <button id="logout-btn-no" class="logout-btn no">취소</button>
            </div>
        </div>
    </div>
</body>
</html>
