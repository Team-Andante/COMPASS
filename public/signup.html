<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - COMPASS</title>
    <link rel="stylesheet" href="./style/style.css">
    <link rel="stylesheet" href="./style/auth.css">
    <style>
        .input-wrapper {
            position: relative;
        }
        .input-wrapper input {
            width: 100%;
            padding-right: 44px;
        }
        .toggle-pw {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            padding: 0;
            line-height: 1;
        }
        .input-hint {
            font-size: 0.78rem;
            margin-top: 5px;
            min-height: 16px;
            transition: color 0.2s;
        }
        .pw-strength {
            display: flex;
            gap: 4px;
            margin-top: 6px;
        }
        .pw-strength span {
            flex: 1;
            height: 4px;
            border-radius: 4px;
            background: #eee;
            transition: background 0.3s;
        }
        .pw-strength.weak   span:nth-child(1)                     { background: #ef4444; }
        .pw-strength.medium span:nth-child(1),
        .pw-strength.medium span:nth-child(2)                     { background: #f59e0b; }
        .pw-strength.strong span                                  { background: #22c55e; }
        .btn-spinner {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script type="module" src="./scripts/main.js" defer></script>
</head>
<body>

    <nav class="navbar">
        <div class="logo" onclick="location.href='/index.html'" style="cursor:pointer">
            <img src="./images/logo.png" alt="COMPASS 로고" class="logoimg">
            COM<span>PASS</span>
        </div>
        <div class="nav-links">
            <a href="#">서비스 소개</a>
            <button class="login-btn" onclick="location.href='/login.html'">로그인</button>
        </div>
    </nav>

    <main class="container auth-container">
        <article class="auth-card">
            <div class="auth-header">
                <span class="card-icon">🚀</span>
                <h2>시작해볼까요?</h2>
                <p>몇 가지 정보만 입력하면 스마트한 학습이 시작됩니다.</p>
            </div>

            <form class="auth-form" id="signup-form" novalidate>
                <div class="input-group">
                    <label for="name">이름</label>
                    <input type="text" id="name" placeholder="실명을 입력해 주세요"
                           autocomplete="name" required>
                </div>

                <div class="input-group">
                    <label for="email">이메일 주소</label>
                    <input type="email" id="email" placeholder="example@edu.com"
                           autocomplete="email" required>
                </div>

                <div class="input-group">
                    <label for="password">비밀번호</label>
                    <div class="input-wrapper">
                        <input type="password" id="password"
                               placeholder="6자 이상의 영문, 숫자 조합"
                               autocomplete="new-password" required minlength="6">
                        <button type="button" class="toggle-pw" id="toggle-password"
                                aria-label="비밀번호 표시/숨기기">👁️</button>
                    </div>
                    <!-- 비밀번호 강도 표시 바 -->
                    <div class="pw-strength" id="pw-strength">
                        <span></span><span></span><span></span>
                    </div>
                    <p class="input-hint" id="pw-strength-hint"></p>
                </div>

                <div class="input-group">
                    <label for="password-confirm">비밀번호 확인</label>
                    <div class="input-wrapper">
                        <input type="password" id="password-confirm"
                               placeholder="비밀번호를 한번 더 입력해 주세요"
                               autocomplete="new-password" required>
                        <button type="button" class="toggle-pw" id="toggle-password-confirm"
                                aria-label="비밀번호 확인 표시/숨기기">👁️</button>
                    </div>
                    <p class="input-hint" id="pw-confirm-hint"></p>
                </div>

                <div class="agreement-group">
                    <label class="checkbox-container">
                        <input type="checkbox" id="terms-agreement" required>
                        <span class="checkmark"></span>
                        <span class="label-text">이용약관 및 개인정보 처리방침에 동의합니다.</span>
                    </label>
                </div>

                <button type="submit" class="submit-btn" id="submit-btn"
                        style="background: var(--point-coral);">
                    <span class="btn-spinner" id="btn-spinner"></span>
                    <span id="btn-text">가입 완료하기</span>
                </button>
            </form>

            <div class="auth-footer">
                <p>이미 계정이 있으신가요?
                    <a href="/login.html" style="color: var(--primary-mint);">로그인하기</a>
                </p>
            </div>
        </article>
    </main>

    <div id="toast-container" class="toast-container"></div>

    <script type="module">
        // 비밀번호 강도 측정 (main.js 로드 전 순수 UI 동작)
        const pwInput     = document.getElementById('password');
        const strengthBar = document.getElementById('pw-strength');
        const strengthHint = document.getElementById('pw-strength-hint');

        pwInput?.addEventListener('input', () => {
            const v = pwInput.value;
            strengthBar.className = 'pw-strength';
            if (!v) { strengthHint.textContent = ''; return; }

            const hasLetter = /[a-zA-Z]/.test(v);
            const hasNumber = /[0-9]/.test(v);
            const hasSpecial = /[^a-zA-Z0-9]/.test(v);
            const score = (v.length >= 8 ? 1 : 0) + (hasLetter && hasNumber ? 1 : 0) + (hasSpecial ? 1 : 0);

            if (v.length < 6) {
                strengthBar.classList.add('weak');
                strengthHint.textContent = '너무 짧습니다 (최소 6자)';
                strengthHint.style.color = '#ef4444';
            } else if (score <= 1) {
                strengthBar.classList.add('weak');
                strengthHint.textContent = '보통 이하 — 숫자/특수문자를 추가해보세요';
                strengthHint.style.color = '#ef4444';
            } else if (score === 2) {
                strengthBar.classList.add('medium');
                strengthHint.textContent = '보통 수준';
                strengthHint.style.color = '#f59e0b';
            } else {
                strengthBar.classList.add('strong');
                strengthHint.textContent = '안전한 비밀번호입니다 ✅';
                strengthHint.style.color = '#22c55e';
            }
        });

        // 비밀번호 확인 토글
        document.getElementById('toggle-password-confirm')?.addEventListener('click', () => {
            const input = document.getElementById('password-confirm');
            const btn   = document.getElementById('toggle-password-confirm');
            input.type  = input.type === 'password' ? 'text' : 'password';
            btn.textContent = input.type === 'password' ? '👁️' : '🙈';
        });

        // 비밀번호 토글 (main.js에도 있지만 확인란과 분리)
        document.getElementById('toggle-password')?.addEventListener('click', () => {
            const input = document.getElementById('password');
            const btn   = document.getElementById('toggle-password');
            input.type  = input.type === 'password' ? 'text' : 'password';
            btn.textContent = input.type === 'password' ? '👁️' : '🙈';
        });
    </script>

</body>
</html>
