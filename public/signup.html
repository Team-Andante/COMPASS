<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - COMPASS</title>
    <link rel="stylesheet" href="./css/base/theme.css">
    <link rel="stylesheet" href="./css/components/navbar.css">
    <link rel="stylesheet" href="./css/components/buttons.css">
    <link rel="stylesheet" href="./css/pages/auth.css">
    <link rel="stylesheet" href="./css/components/toasts.css">
    <script type="module" src="./scripts/main.js" defer></script>
</head>
<body>
    <nav class="navbar">
        <div class="logo" onclick="location.href='/index.html'" style="cursor:pointer">
            <img src="./images/logo.png" alt="COMPASS 로고" class="logoimg">
            COM<span>PASS</span>
        </div>
        <div class="nav-links">
            <a href="./mypage.html">마이페이지</a>
        </div>
    </nav>

    <main class="container auth-container">
        <article class="auth-card">
            <div class="auth-header">
                <span class="card-icon">🚀</span>
                <h2>시작해볼까요?</h2>
                <p>몇 가지 정보만 입력하면 스마트한 학습이 시작됩니다.</p>
            </div>

            <form class="auth-form" id="signup-form" novalidate>
                <div class="input-group">
                    <label for="name">이름</label>
                    <input type="text" id="name" placeholder="실명을 입력해 주세요"
                           autocomplete="name" required>
                </div>

                <div class="input-group">
                    <label for="email">이메일 주소</label>
                    <input type="email" id="email" placeholder="example@edu.com"
                           autocomplete="email" required>
                </div>

                <div class="input-group">
                    <label for="password">비밀번호</label>
                    <div class="input-wrapper">
                        <input type="password" id="password"
                               placeholder="6자 이상의 영문, 숫자 조합"
                               autocomplete="new-password" required minlength="6">
                        <button type="button" class="toggle-pw" id="toggle-password"
                                aria-label="비밀번호 표시/숨기기">⊘</button>
                    </div>
                    <!-- 비밀번호 강도 표시 바 -->
                    <div class="pw-strength" id="pw-strength">
                        <span></span><span></span><span></span>
                    </div>
                    <p class="input-hint" id="pw-strength-hint"></p>
                </div>

                <div class="input-group">
                    <label for="password-confirm">비밀번호 확인</label>
                    <div class="input-wrapper">
                        <input type="password" id="password-confirm"
                               placeholder="비밀번호를 한번 더 입력해 주세요"
                               autocomplete="new-password" required>
                        <button type="button" class="toggle-pw" id="toggle-password-confirm"
                                aria-label="비밀번호 확인 표시/숨기기">⊘</button>
                    </div>
                    <p class="input-hint" id="pw-confirm-hint"></p>
                </div>

                <div class="agreement-group">
                    <label class="checkbox-container">
                        <input type="checkbox" id="terms-agreement" required>
                        <span class="checkmark"></span>
                        <span class="label-text">이용약관 및 개인정보 처리방침에 동의합니다.</span>
                    </label>
                </div>

                <button type="submit" class="submit-btn" id="submit-btn"
                        style="background: var(--point-coral);">
                    <span class="btn-spinner" id="btn-spinner"></span>
                    <span id="btn-text">가입 완료하기</span>
                </button>
            </form>

            <div class="auth-footer">
                <p>이미 계정이 있으신가요?
                    <a href="/login.html" style="color: var(--primary-mint);">로그인하기</a>
                </p>
            </div>
        </article>
    </main>

    <div id="toast-container" class="toast-container"></div>
</body>
</html>
