<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>맞춤형 학생 혜택 패키지 - COMPASS</title>
    <link rel="stylesheet" href="./css/base/theme.css">
    <link rel="stylesheet" href="./css/components/navbar.css">
    <link rel="stylesheet" href="./css/components/buttons.css">
    <link rel="stylesheet" href="./css/components/cards.css">
    <link rel="stylesheet" href="./css/components/toasts.css">
    <link rel="stylesheet" href="./css/pages/pack_rec.css">
    <script type="module" src="./scripts/pack_rec.js " defer></script>
    <script type="module" src="./scripts/logout.js" defer></script>
</head>

<body>
    <nav class="navbar">
        <div class="logo" onclick="location.href='/index_reged.html'" style="cursor:pointer">
            <img src="./images/logo.png" alt="COMPASS 로고" class="logoimg">
            COM<span>PASS</span>
        </div>
        <div class="nav-links">
            <a href="./mypage.html">마이페이지</a>
            <button class="logout-btn">로그아웃</button>
        </div>
    </nav>

    <div class="container">
        <button type="button" class="back-btn" onclick="history.back();" aria-label="뒤로가기">← 이전 페이지로 돌아가기</button>

        <div class="section-title">
            <h2>추천 배경 입력</h2>
            <div class="section-title-line"></div>
        </div>
        <div class="upload-box">
        <form id="personaForm">
            <div class="form-group">
                <label for="grade">내 성적 등급</label>
                <div class="slider-container">
                    <input type="range" id="grade" min="1" max="5" value="3.00" step="0.01">
                    <span id="gradeValue" class="grade-output">3.00등급</span>
                </div>
            </div>

            <div class="form-group">
                <label>경제적 여건 소득 분위</label>
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="economy" value="기초생활수급자 또는 차상위계층" checked>
                        기초생활수급자 / 차상위계층
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="economy" value="소득분위 1~3구간 (저소득층)">
                        소득분위 1~3구간 (저소득층)
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="economy" value="소득분위 4~8구간 (중위소득)">
                        소득분위 4~8구간 (중위소득)
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="economy" value="소득분위 9~10구간 (고소득층)">
                        소득분위 9~10구간 (일반/고소득층)
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label for="interest">현재 가장 큰 관심사 또는 활동</label>
                <input type="text" id="interest" placeholder="예: 해외 연수, IT 개발 공부, 창업, 기숙사 입소 등" required>
            </div>

            <div class="submit-container">
                <button type="submit" id="btnProcess">맞춤 혜택 제안받기</button>
            </div>
        </form>
        <div class="loading-spinner-wrapper" id="loading">
            <div class="spinner"></div>
            <span>Gemini 가장 적합한 혜택 패키지를 찾고 있습니다...</span>
        </div>

        <div id="errorBox" class="error-box"></div>
        </div>

        <div class="result-container" id="resultContainer">
            <div class="section-title" id="result-title">
                <h2>AI 추천 맞춤 혜택</h2>
                <div class="section-title-line"></div>
            </div>
            <div id="cardWrapper" class="card-wrapper"></div>
        </div>
    </div>
    <div id="logout-modal" class="logout-modal">
        <div class="logout-content">
            <p>로그아웃 하시겠습니까?</p>
            <div class="logout-buttons">
                <button id="logout-btn-yes" class="logout-btn yes">확인</button>
                <button id="logout-btn-no" class="logout-btn no">취소</button>
            </div>
        </div>
    </div>
</body>
</html>
