<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>맞춤형 학생 혜택 패키지 - COMPASS</title>
    <link rel="stylesheet" href="./style/style.css">
    <link rel="stylesheet" href="./style/pack_rec.css">
</head>

<body>
    <nav class="navbar">
        <div class="logo" onclick="location.href='/index.html'">
            <img src="./images/logo.png" alt="COMPASS 로고" class="logoimg">
            COM<span>PASS</span>
        </div>
        <div class="nav-links">
            <a href="#">서비스 소개</a>
            <a href="#">마이페이지</a>
        </div>
    </nav>
    
    <button type="button" class="back-btn" onclick="history.back();" aria-label="뒤로가기">←</button>

    <div class="container">
    <h1>🎓 맞춤형 혜택 패키지 추천</h1>

    <form id="personaForm">
        <div class="form-group">
            <label for="grade">내 성적 등급</label>
            <div class="slider-container">
                <input type="range" id="grade" min="1" max="5" value="3" step="0.01">
                <span id="gradeValue" class="grade-output">3등급</span>
            </div>
        </div>

        <div class="form-group">
            <label>경제적 여건 소득 분위</label>
            <div class="radio-group">
                <label class="radio-label">
                    <input type="radio" name="economy" value="기초생활수급자 또는 차상위계층" checked>
                    기초생활수급자 / 차상위계층
                </label>
                <label class="radio-label">
                    <input type="radio" name="economy" value="소득분위 1~3구간 (저소득층)">
                    소득분위 1~3구간 (저소득층)
                </label>
                <label class="radio-label">
                    <input type="radio" name="economy" value="소득분위 4~8구간 (중위소득)">
                    소득분위 4~8구간 (중위소득)
                </label>
                <label class="radio-label">
                    <input type="radio" name="economy" value="소득분위 9~10구간 (고소득층)">
                    소득분위 9~10구간 (일반/고소득층)
                </label>
            </div>
        </div>

        <div class="form-group">
            <label for="interest">현재 가장 큰 관심사 또는 활동</label>
            <input type="text" id="interest" placeholder="예: 해외 연수, IT 개발 공부, 창업, 기숙사 입소 등" required>
        </div>

        <div class="submit-container">
            <button type="submit" id="submitBtn">맞춤 혜택 제안받기</button>
        </div>
    </form>

    <div id="loading" class="loading">AI가 가장 적합한 혜택 패키지를 분석 중입니다...</div>

    <div id="errorBox" class="error-box"></div>

    <div id="resultContainer" class="result-container">
        <h2 class="result-title">✨ AI 추천 맞춤 혜택 패키지 ✨</h2>
        <div id="cardWrapper" class="card-wrapper"></div>
    </div>
</div>

<script>
    const gradeSlider = document.getElementById('grade');
    const gradeValue = document.getElementById('gradeValue');

    gradeSlider.addEventListener('input', (e) => {
    const formattedValue = parseFloat(e.target.value).toFixed(2);
    gradeValue.textContent = `${formattedValue}등급`;
});

    document.getElementById('personaForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const submitBtn = document.getElementById('submitBtn');
        const loadingDiv = document.getElementById('loading');
        const resultContainer = document.getElementById('resultContainer');
        const cardWrapper = document.getElementById('cardWrapper');
        const errorBox = document.getElementById('errorBox');

        const grade = gradeSlider.value;
        const economy = document.querySelector('input[name="economy"]:checked').value;
        const interest = document.getElementById('interest').value;

        const promptMessage = `
다음 학생의 정보를 바탕으로 가장 적합한 정부, 지자체, 또는 대학의 학생 혜택 프로그램 3가지를 엄선해줘.

[학생 정보]
- 성적: ${grade}등급
- 경제적 여건: ${economy}
- 관심사: ${interest}

[응답 규격]
반드시 다른 설명 없이 아래의 JSON 배열 포맷으로만 답변해줘. 마크다운 기호(\`\`\`json)도 붙이지 말고 순수 JSON 텍스트만 출력해.
신청 링크(url)는 해당 프로그램의 실제 공식 신청 페이지 주소를 제공해.

[
  {
    "title": "혜택 프로그램 이름 1",
    "reason": "이 학생에게 추천하는 이유 설명",
    "content": "지원 내용 및 혜택 상세 설명",
    "url": "https://example.com"
  },
  {
    "title": "혜택 프로그램 이름 2",
    "reason": "추천 이유",
    "content": "지원 내용",
    "url": "https://example.com"
  },
  {
    "title": "혜택 프로그램 이름 3",
    "reason": "추천 이유",
    "content": "지원 내용",
    "url": "https://example.com"
  }
]
        `.trim();

        submitBtn.disabled = true;
        loadingDiv.style.display = 'block';
        resultContainer.style.display = 'none';
        errorBox.style.display = 'none';
        cardWrapper.innerHTML = '';

        try {
                const response = await fetch(`/api/recommend`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: promptMessage })
            });

            const data = await response.json();

            if (response.ok) {
                let cleanJsonText = data.answer.replace(/```json|```/g, '').trim();
                const benefits = JSON.parse(cleanJsonText);

                benefits.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'benefit-card';
                    card.innerHTML = `
                        <div class="card-content">
                            <h3>🎁 ${item.title}</h3>
                            <p><strong>🤔 선정 이유:</strong> ${item.reason}</p>
                            <p><strong>📝 지원 내용:</strong> ${item.content}</p>
                        </div>
                        <a href="${item.url}" target="_blank" class="link-btn">🚀 신청하러 가기</a>
                    `;
                    cardWrapper.appendChild(card);
                });

                loadingDiv.style.display = 'none';
                resultContainer.style.display = 'block';
            } else {
                throw new Error(data.error || '알 수 없는 오류');
            }

        } catch (error) {
            console.error(error);
            loadingDiv.style.display = 'none';
            errorBox.textContent = `오류가 발생했습니다: ${error.message}. 다시 시도해주세요.`;
            errorBox.style.display = 'block';
        } finally {
            submitBtn.disabled = false;
        }
    });
</script>

</body>
</html>
