<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 가정통신문 요약 - COMPASS</title>
    <link rel="stylesheet" href="./css/base/theme.css">
    <link rel="stylesheet" href="./css/components/navbar.css">
    <link rel="stylesheet" href="./css/components/buttons.css">
    <link rel="stylesheet" href="./css/components/toasts.css">
    <link rel="stylesheet" href="./css/pages/notice.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <script type="module" src="./scripts/notice.js " defer></script>
    <script type="module" src="./scripts/logout.js" defer></script>
</head>
<body>
    <nav class="navbar">
        <div class="logo" onclick="location.href='/index_reged.html'" style="cursor:pointer">
            <img src="./images/logo.png" alt="COMPASS 로고" class="logoimg">
            COM<span>PASS</span>
        </div>
        <div class="nav-links">
            <a href="./login.html">서비스 소개</a>
            <a href="./mypage.html">마이페이지</a>
            <button class="logout-btn">로그아웃</button>
        </div>
    </nav>

    <button type="button" class="back-btn" onclick="history.back();" aria-label="뒤로가기">←</button>
    
    <div class="container">
        <h2>📄 AI 공지사항 요약기</h2>
        <div class="upload-section">
            <input type="file" id="pdfFile" accept=".pdf,.jpg,.jpeg,.png,.webp">
        </div>
        <button id="btnProcess" onclick="startSummary()">분석 및 요약 시작</button>
        <div id="loader" class="loading">⏳ AI가 파일을 분석하고 있습니다... (약 30초 소요)</div>
        <div id="result-box">
            <h3>✨ 요약 결과</h3>
            <div id="textContent"></div>
        </div>
    </div>

    <div id="logout-modal" class="logout-modal">
        <div class="logout-content">
            <p>로그아웃 하시겠습니까?</p>
            <div class="logout-buttons">
                <button id="logout-btn-yes" class="logout-btn yes">확인</button>
                <button id="logout-btn-no" class="logout-btn no">취소</button>
            </div>
        </div>
    </div>
</body>
</html>
