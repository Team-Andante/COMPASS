<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - COMPASS</title>
    <link rel="stylesheet" href="./css/base/theme.css">
    <link rel="stylesheet" href="./css/components/navbar.css">
    <link rel="stylesheet" href="./css/components/buttons.css">
    <link rel="stylesheet" href="./css/pages/auth.css">
    <link rel="stylesheet" href="./css/components/toasts.css">
    <script type="module" src="./scripts/login.js" defer></script>
</head>
<body>
    <nav class="navbar">
        <div class="logo" onclick="location.href='/index.html'" style="cursor:pointer">
            <img src="./images/logo.png" alt="COMPASS 로고" class="logoimg">
            COM<span>PASS</span>
        </div>
        <div class="nav-links">
            <a href="./login.html">서비스 소개</a>
        </div>
    </nav>

    <main class="container auth-container">
        <article class="auth-card">
            <div class="auth-header">
                <span class="card-icon">👋</span>
                <h2>반가워요!</h2>
                <p>성장을 위한 스마트한 첫 걸음, 지금 시작하세요.</p>
            </div>

            <form class="auth-form" id="login-form" novalidate>
                <div class="input-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" placeholder="example@edu.com" autocomplete="email" required>
                </div>

                <div class="input-group">
                    <label for="password">비밀번호</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" placeholder="비밀번호를 입력하세요" autocomplete="current-password" required>
                        <button type="button" class="toggle-pw" id="toggle-password" aria-label="비밀번호 표시/숨기기">⊘</button>
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="submit-btn">
                    <span class="btn-spinner" id="btn-spinner"></span>
                    <span id="btn-text">로그인하기</span>
                </button>
            </form>

            <div class="auth-footer">
                <p>아직 계정이 없으신가요?
                    <a href="/signup.html">회원가입하기</a>
                </p>
            </div>
        </article>
    </main>

    <div id="toast-container" class="toast-container"></div>
    <footer>
        <p>&copy; 2024 EduWelfare. All rights reserved.</p>
    </footer>
</body>
</html>
