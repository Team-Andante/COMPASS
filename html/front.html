<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>맞춤형 학생 혜택 패키지 제안</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 1000px; /* 3개 카드가 가로로 드려야 하므로 전체 폭을 넓힙니다. */
            width: 100%;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 {
            font-size: 24px;
            color: #333;
            margin-bottom: 25px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 25px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #444;
        }
        .slider-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        input[type="range"] {
            flex: 1;
        }
        .grade-output {
            font-weight: bold;
            color: #007bff;
            width: 50px;
        }
        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .radio-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: normal;
            cursor: pointer;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }
        .submit-container {
            text-align: center;
            max-width: 600px;
            margin: 0 auto;
        }
        #submitBtn {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        #submitBtn:hover {
            background-color: #0056b3;
        }
        #submitBtn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        .loading {
            text-align: center;
            display: none;
            color: #666;
            font-style: italic;
            margin-top: 15px;
        }

        /* ─── 여기서부터 가로 3개 카드 박스 스타일 ─── */
        .result-container {
            margin-top: 40px;
            display: none; /* 초기에는 숨김 */
        }
        .result-title {
            text-align: center;
            font-size: 20px;
            margin-bottom: 20px;
            color: #333;
        }
        .card-wrapper {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap; /* 화면이 좁아지면 아래로 떨어지게 설정 */
        }
        .benefit-card {
            flex: 1;
            min-width: 280px;
            max-width: 320px;
            background: #f8f9fa;
            border-top: 5px solid #007bff;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            display: flex;
            flex-direction: column; /* 내용과 버튼을 위아래로 배치 */
            justify-content: space-between; /* 버튼이 항상 카드 맨 아래에 오도록 설정 */
        }
        .card-content h3 {
            margin-top: 0;
            color: #007bff;
            font-size: 18px;
            margin-bottom: 15px;
        }
        .card-content p {
            font-size: 14px;
            color: #555;
            line-height: 1.6;
            margin-bottom: 12px;
        }
        .card-content strong {
            color: #333;
        }
        .link-btn {
            display: block;
            text-align: center;
            background-color: #28a745;
            color: white;
            text-decoration: none;
            padding: 10px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 14px;
            margin-top: 15px;
            transition: background 0.2s;
        }
        .link-btn:hover {
            background-color: #218838;
        }
        /* 에러 메시지 스타일 */
        .error-box {
            color: red;
            text-align: center;
            margin-top: 20px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎓 맞춤형 혜택 패키지 추천</h1>
    
    <form id="personaForm">
        <div class="form-group">
            <label for="grade">내 성적 등급</label>
            <div class="slider-container">
                <input type="range" id="grade" min="1" max="5" value="3" step="1">
                <span id="gradeValue" class="grade-output">3등급</span>
            </div>
        </div>

        <div class="form-group">
            <label>경제적 여건 소득 분위</label>
            <div class="radio-group">
                <label class="radio-label">
                    <input type="radio" name="economy" value="기초생활수급자 또는 차상위계층" checked> 기초생활수급자 / 차상위계층
                </label>
                <label class="radio-label">
                    <input type="radio" name="economy" value="소득분위 1~3구간 (저소득층)"> 소득분위 1~3구간 (저소득층)
                </label>
                <label class="radio-label">
                    <input type="radio" name="economy" value="소득분위 4~8구간 (중위소득)"> 소득분위 4~8구간 (중위소득)
                </label>
                <label class="radio-label">
                    <input type="radio" name="economy" value="소득분위 9~10구간 (고소득층)"> 소득분위 9~10구간 (일반/고소득층)
                </label>
            </div>
        </div>

        <div class="form-group">
            <label for="interest">현재 가장 큰 관심사 또는 활동</label>
            <input type="text" id="interest" placeholder="예: 해외 연수, IT 개발 공부, 창업, 기숙사 입소 등" required>
        </div>

        <div class="submit-container">
            <button type="submit" id="submitBtn">맞춤 혜택 제안받기</button>
        </div>
    </form>

    <div id="loading" class="loading">AI가 가장 적합한 혜택 패키지를 분석 중입니다...</div>
    
    <div id="errorBox" class="error-box"></div>

    <div id="resultContainer" class="result-container">
        <h2 class="result-title">✨ AI 추천 맞춤 혜택 패키지 ✨</h2>
        <div id="cardWrapper" class="card-wrapper">
            </div>
    </div>
</div>

<script>
    const gradeSlider = document.getElementById('grade');
    const gradeValue = document.getElementById('gradeValue');
    
    gradeSlider.addEventListener('input', (e) => {
        gradeValue.textContent = `${e.target.value}등급`;
    });

    document.getElementById('personaForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const submitBtn = document.getElementById('submitBtn');
        const loadingDiv = document.getElementById('loading');
        const resultContainer = document.getElementById('resultContainer');
        const cardWrapper = document.getElementById('cardWrapper');
        const errorBox = document.getElementById('errorBox');

        const grade = gradeSlider.value;
        const economy = document.querySelector('input[name="economy"]:checked').value;
        const interest = document.getElementById('interest').value;

        // 중요: Gemini가 JSON 배열 형태로만 대답하도록 프롬프트를 정밀하게 작성합니다.
        const promptMessage = `
            다음 학생의 정보를 바탕으로 가장 적합한 정부, 지자체, 또는 대학의 학생 혜택 프로그램 3가지를 엄선해줘.
            
            [학생 정보]
            - 성적: ${grade}등급
            - 경제적 여건: ${economy}
            - 관심사: ${interest}

            [응답 규격]
            반드시 다른 설명 없이 아래의 JSON 배열 포맷으로만 답변해줘. 마크다운 기호(\`\`\`json)도 붙이지 말고 순수 JSON 텍스트만 출력해.
            신청 링크(url)는 해당 프로그램의 실제 공식 신청 페이지 주소(예: 한국장학재단, 워크넷, 기업 등의 메인 도메인이나 관련 URL)를 제공해.
            프로그램의 내용과 신청 페이지 주소에는 너의 주관이 들어가면 안 돼. 실존하고 정상적으로 접속 가능한 링크만을 제공해.

            [
              {
                "title": "혜택 프로그램 이름 1",
                "reason": "이 학생에게 추천하는 이유 설명",
                "content": "지원 내용 및 혜택 상세 설명",
                "url": "https://example.com"
              },
              {
                "title": "혜택 프로그램 이름 2",
                "reason": "추천 이유",
                "content": "지원 내용",
                "url": "https://example.com"
              },
              {
                "title": "혜택 프로그램 이름 3",
                "reason": "추천 이유",
                "content": "지원 내용",
                "url": "https://example.com"
              }
            ]
        `.trim();

        submitBtn.disabled = true;
        loadingDiv.style.display = 'block';
        resultContainer.style.display = 'none';
        errorBox.style.display = 'none';
        cardWrapper.innerHTML = ''; // 기존 카드 초기화

        try {
            const response = await fetch('http://localhost:3000/ask-ai', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: promptMessage })
            });

            const data = await response.json();

            if (response.ok) {
                // AI의 답변 텍스트를 JSON 객체(배열)로 파싱합니다.
                // 만약 AI가 마크다운 코드 블록(\`\`\`json)을 포함해 보냈을 경우를 대비해 정규식으로 다듬어 줍니다.
                let cleanJsonText = data.answer.replace(/```json|```/g, '').trim();
                const benefits = JSON.parse(cleanJsonText);

                // 3개의 데이터를 가로 카드 형태로 동적 생성
                benefits.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'benefit-card';
                    card.innerHTML = `
                        <div class="card-content">
                            <h3>🎁 ${item.title}</h3>
                            <p><strong>🤔 선정 이유:</strong> ${item.reason}</p>
                            <p><strong>📝 지원 내용:</strong> ${item.content}</p>
                        </div>
                        <a href="${item.url}" target="_blank" class="link-btn">🚀 신청하러 가기</a>
                    `;
                    cardWrapper.appendChild(card);
                });

                loadingDiv.style.display = 'none';
                resultContainer.style.display = 'block';
            } else {
                throw new Error(data.error || '알 수 없는 오류');
            }

        } catch (error) {
            console.error(error);
            loadingDiv.style.display = 'none';
            errorBox.textContent = `오류가 발생했습니다: ${error.message}. 다시 시도해주세요.`;
            errorBox.style.display = 'block';
        } finally {
            submitBtn.disabled = false;
        }
    });
</script>

</body>
</html>
