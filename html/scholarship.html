<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Andante | Gemini 3.5 장학금 가이드</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style/scholarship.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .ai-chat-card { border: 2px solid #48D1CC; background: #ffffff; padding: 25px; border-radius: 20px; margin-bottom: 25px; box-shadow: 0 10px 25px rgba(72, 209, 204, 0.1); }
        .ai-group { display: flex; gap: 12px; margin-top: 15px; }
        #aiInput { flex: 1; padding: 14px; border-radius: 12px; border: 1.5px solid #e2e8f0; font-size: 15px; }
        .ai-btn { background: #48D1CC; color: white; border: none; padding: 0 25px; border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .ai-btn:hover { background: #3cb3af; transform: translateY(-2px); }
        #aiResponse { display: none; margin-top: 20px; padding: 20px; background: #fdfdfd; border-radius: 15px; line-height: 1.7; border: 1px solid #eee; border-top: 4px solid #48D1CC; }
        
        /* 마크다운 스타일링 */
        #aiResponse table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        #aiResponse th, #aiResponse td { border: 1px solid #cbd5e1; padding: 10px; text-align: left; font-size: 14px; }
        #aiResponse th { background: #f1f5f9; color: #1e293b; }
        #aiResponse ul { padding-left: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>🎓 장학금 AI 가이드 (Gemini 3.5 Flash)</h2>
            <div class="update-tag">⚡ 최신 모델 기반 실시간 분석 중</div>
        </div>

        <div class="ai-chat-card">
            <span class="filter-label">🤖 Gemini 3.5에게 물어보기</span>
            <div class="ai-group">
                <input type="text" id="aiInput" placeholder="예: 양천구 거주 고등학생 장학금 조건 요약해줘">
                <button class="ai-btn" onclick="askAI()">질문하기</button>
            </div>
            <div id="aiResponse"></div>
        </div>
    </div>

    <script>
        async function askAI() {
            const input = document.getElementById('aiInput');
            const resDiv = document.getElementById('aiResponse');
            if(!input.value.trim()) return;

            resDiv.style.display = 'block';
            resDiv.innerHTML = '⚡ <b>Gemini 3.5 Flash</b>가 데이터를 분석하고 있습니다...';

            try {
                const response = await fetch('http://localhost:3000/ask-ai', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ message: input.value })
                });
                const data = await response.json();
                // 마크다운 변환 및 출력
                resDiv.innerHTML = `<div style="color:#64748b; font-size:12px; margin-bottom:10px;">🤖 AI 상담 결과:</div>` + marked.parse(data.reply);
            } catch (e) {
                resDiv.innerHTML = '<span style="color:red;">❌ 서버 연결에 실패했습니다.</span>';
            }
        }

        <iframe src="https://notebooklm.google.com/notebook/2ec911a4-25bb-44fa-9ae7-73dcfee81bb5" width="100%" height="600px"></iframe>
    </script>
</body>
</html>
