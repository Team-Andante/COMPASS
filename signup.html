<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 | 스마트 에듀 플랫폼</title>
    <link rel="stylesheet" href="style/style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo" onclick="location.href='index.html'" style="cursor:pointer">Edu<span>Smart</span></div>
        <div class="nav-links">
            <a href="#">서비스 소개</a>
            <button class="login-btn" onclick="location.href='login.html'">로그인</button>
        </div>
    </nav>

    <main class="container auth-container">
        <article class="auth-card">
            <div class="auth-header">
                <span class="card-icon">🚀</span>
                <h2>시작해볼까요?</h2>
                <p>몇 가지 정보만 입력하면 스마트한 학습이 시작됩니다.</p>
            </div>

            <form class="auth-form">
                <div class="input-group">
                    <label for="name">이름</label>
                    <input type="text" id="name" placeholder="실명을 입력해 주세요" required>
                </div>

                <div class="input-group">
                    <label for="email">이메일 주소</label>
                    <input type="email" id="email" placeholder="example@edu.com" required>
                </div>
                
                <div class="input-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" placeholder="8자 이상의 영문, 숫자 조합" required>
                </div>

                <div class="input-group">
                    <label for="password-confirm">비밀번호 확인</label>
                    <input type="password" id="password-confirm" placeholder="비밀번호를 한번 더 입력해 주세요" required>
                </div>

                <div class="agreement-group">
                    <label class="checkbox-container">
                        <input type="checkbox" required>
                        <span class="checkmark"></span>
                        <span class="label-text">이용약관 및 개인정보 처리방침에 동의합니다.</span>
                    </label>
                </div>

                <button type="submit" class="submit-btn" style="background: var(--point-coral);">가입 완료하기</button>
            </form>

            <div class="auth-footer">
                <p>이미 계정이 있으신가요? <a href="login.html" style="color: var(--primary-mint);">로그인하기</a></p>
            </div>
        </article>
    </main>

</body>
</html>
